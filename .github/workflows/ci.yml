name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang

      - name: Create build directory
        run: mkdir -p build

      - name: Configure
        working-directory: ./build
        run: |
          cmake \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -DCMAKE_BUILD_TYPE=Release \
            -Dformatter_lib_DIR=../formatter_lib \
            -Dformatter_ex_lib_DIR=../formatter_ex_lib \
            -Dsolver_lib_DIR=../solver_lib \
            -Dhello_world_application_DIR=../hello_world_application \
            -Dsolver_application_DIR=../solver_application \
            ..

      - name: Build
        working-directory: ./build
        run: cmake --build . --verbose

      - name: Run tests
        run: |
          ./build/hello_world_application/hello_world
          ./build/solver_application/solver_application
