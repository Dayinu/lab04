name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
        include:
          - compiler: gcc
            cxx_package: g++
          - compiler: clang
            cxx_package: clang
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            ${{ matrix.cxx_package }} \
            libfmt-dev

      - name: Configure and build formatter_lib
        run: |
          cd formatter_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build . --verbose
          ctest --output-on-failure || true

      - name: Configure and build formatter_ex_lib
        run: |
          cd formatter_ex_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build . --verbose

      - name: Build and test solver
        run: |
          cd solver_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .
          ctest --output-on-failure || true

      - name: Build applications
        run: |
          for app in hello_world_application solver_application; do
            cd $app
            mkdir -p build && cd build
            cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
            cmake --build .
            cd ../..
          done

      - name: Upload build artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.compiler }}-binaries
          path: |
            */build/**
            !**/*.o
          retention-days: 3
