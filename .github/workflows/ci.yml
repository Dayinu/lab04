name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
      fail-fast: false  # Не отменять другие jobs при ошибке

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang

      - name: Prepare build dir
        run: |
          mkdir -p build
          ls -la formatter_lib/  # Для отладки

      - name: Configure
        run: |
          cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..

      - name: Build
        run: |
          cd build
          cmake --build . --verbose

      - name: Run tests
        run: |
          ./build/hello_world_application/hello_world
          ./build/solver_application/solver_application
