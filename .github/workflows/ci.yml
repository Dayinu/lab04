name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang

      - name: Build formatter_lib
        working-directory: formatter_lib
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Build formatter_ex_lib
        working-directory: formatter_ex_lib
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -Dformatter_DIR=$(realpath ../../formatter_lib/build) ..
          cmake --build .

      - name: Build solver_lib
        working-directory: solver_lib
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -Dformatter_ex_DIR=$(realpath ../../formatter_ex_lib/build) ..
          cmake --build .

      - name: Build hello_world
        working-directory: hello_world_application
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -Dformatter_ex_DIR=$(realpath ../../formatter_ex_lib/build) ..
          cmake --build .

      - name: Build solver_app
        working-directory: solver_application
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -Dformatter_ex_DIR=$(realpath ../../formatter_ex_lib/build) \
            -Dsolver_lib_DIR=$(realpath ../../solver_lib/build) ..
          cmake --build .

      - name: Run tests
        run: |
          ./hello_world_application/build/hello_world
          ./solver_application/build/solver_application
