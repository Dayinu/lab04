name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Unified Build
        run: |
          mkdir -p unified_build
          cd unified_build
          cmake \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ \
            -Dformatter_lib_DIR=../formatter_lib \
            -Dformatter_ex_lib_DIR=../formatter_ex_lib \
            -Dsolver_lib_DIR=../solver_lib \
            ..
          cmake --build . --target all

      - name: Run tests
        run: |
          ./unified_build/hello_world_application/hello_world
          ./unified_build/solver_application/solver_application
