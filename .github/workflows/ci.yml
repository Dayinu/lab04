name: CI Build (Linux - GCC & Clang)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build formatter_lib
        run: |
          cd formatter_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Build formatter_ex_lib
        run: |
          cd formatter_ex_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Build solver_lib
        run: |
          cd solver_lib
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Build hello_world_application
        run: |
          cd hello_world_application
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Build solver_application
        run: |
          cd solver_application
          mkdir -p build && cd build
          cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
          cmake --build .

      - name: Run hello_world
        run: |
          ./hello_world_application/build/hello_world

      - name: Run solver_application
        run: |
          ./solver_application/build/solver_application
