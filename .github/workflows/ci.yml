name: Fixed CI Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            g++ \
            clang \
            libfmt-dev

      - name: Build projects
        run: |
          for project in formatter_lib formatter_ex_lib solver_lib; do
            mkdir -p $project/build
            cd $project/build
            cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
            cmake --build . --verbose
            cd ../..
          done

      - name: Verify applications
        run: |
          for app in hello_world_application solver_application; do
            cd $app
            mkdir -p build && cd build
            cmake -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}++ ..
            cmake --build .
            cd ../..
          done
